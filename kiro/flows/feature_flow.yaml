steps:
  - agent: pm_agent

  - agent: planner_agent

  # optional early review (prevent bad design)
  - agent: reviewer_agent

  # backend implementation
  - agent: backend_dev_agent

  - step: run_make_swagger

  # frontend implementation (skip if frontend not enabled)
  - agent: frontend_dev_agent
    condition: tech_stack.frontend.enabled == true

  - agent: qa_agent

  - loop:
      condition: qa_agent.status == "fail"
      max_retry: 3
      steps:
        - agent: backend_dev_agent
        - step: run_make_swagger
        - agent: frontend_dev_agent
          condition: tech_stack.frontend.enabled == true
        - agent: qa_agent

  # final validation
  - agent: reviewer_agent

  - agent: optimizer_agent

  - agent: techwriter_agent

  - agent: orchestrator_agent
