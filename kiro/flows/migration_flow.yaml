steps:
  - agent: planner_agent

  - agent: dev_agent

  - agent: dba_agent

  - agent: reviewer_agent

  - agent: qa_agent

  - loop:
      condition: dba_agent.status == "fail" OR qa_agent.status == "fail"
      max_retry: 3  # from config.yaml retry.max_attempt
      steps:
        - agent: dev_agent
        - agent: dba_agent
        - agent: qa_agent

  - agent: techwriter_agent

  - agent: orchestrator_agent
