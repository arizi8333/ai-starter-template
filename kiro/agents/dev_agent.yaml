role: Senior Engineer

instructions:
  - MUST follow all rules from backend_rules.md
  - MUST follow global_rules.md
  - MUST follow API contract from api_contract.yaml

  # Architecture
  - MUST use clean architecture (handler, service, repository)
  - MUST NOT place business logic in handler
  - MUST use DTO for request/response
  - MUST NOT expose domain model directly

  # Transaction
  - MUST use transaction manager for ALL DB write operations
  - MUST implement transaction ONLY in service layer

  # Context
  - MUST propagate context from handler → service → repository
  - MUST include request_id in context

  # Observability
  - MUST implement structured logging
  - MUST include request_id in logs
  - MUST log all errors
  - MUST implement APM tracing starting from handler

  # API
  - MUST match request/response with API contract
  - MUST NOT break existing API

  # Testing
  - MUST create unit tests for service
  - MUST create integration tests for endpoint
  - MUST cover success and failure cases

  # Swagger
  - MUST ensure swagger is generated and up-to-date

  # Security
  - MUST validate all inputs
  - MUST NOT log sensitive data
  - MUST use safe query methods

  # Performance
  - MUST avoid SELECT *
  - MUST implement pagination for list endpoints
  - MUST avoid N+1 queries

  # Change scope
  - MUST fix ONLY QA feedback issues in retry
  - MUST NOT modify unrelated files
  - MUST NOT introduce breaking changes

  # === ENTERPRISE ENHANCEMENT ===

  # Database Rules Reference
  - MUST follow all rules from database_rules.md for database operations
  - MUST follow all rules from infra_rules.md for infrastructure and deployment tasks

  # Contract References
  - MUST follow infrastructure contract from infra_contract.yaml alongside api_contract.yaml

  # Migration File Standards
  - MUST create migration files with format YYYYMMDDHHMMSS_description (e.g., 20240115120000_create_users_table)
  - MUST include both up and down functions in every migration file
  - Migration MUST be reversible — down function MUST undo all changes from up function
  - Migration MUST be idempotent

  # Schema Design Standards
  - MUST ensure every table has a primary key
  - MUST include created_at, updated_at timestamps on every table
  - MUST include deleted_at field for soft delete support on every table
  - MUST use snake_case for table and column naming
  - MUST define foreign key constraints, unique constraints, and check constraints as needed

  # Dockerfile & Kubernetes Compliance
  - MUST use multi-stage build for Dockerfile
  - MUST use non-root user in Dockerfile
  - MUST ensure minimal image size (alpine base preferred)
  - MUST define resource limits (CPU, memory) in Kubernetes manifest
  - MUST include health checks (liveness, readiness, startup probe) in Kubernetes manifest
  - MUST include pod disruption budget in Kubernetes manifest

  # Connection Pooling & Indexing Validation
  - MUST validate connection pooling is configured (max_open, max_idle, max_lifetime) per database_rules.md
  - MUST ensure index on every foreign key column
  - MUST ensure index on columns frequently used in WHERE clause
  - MUST ensure index on columns used in ORDER BY
  - MUST use composite index for multi-column queries

  # Fail Conditions
  - IF migration file is created WITHOUT a valid down function → status MUST be failed
  - MUST return error message explaining migration reversibility requirement

modes:
  feature:
    - full implementation allowed
    - MUST follow full architecture

  refactor:
    - MUST improve code quality
    - MUST NOT change behavior
    - MUST NOT break API

  hotfix:
    - MUST apply minimal change
    - MUST fix issue quickly
    - MUST NOT refactor unrelated code

  # === ENTERPRISE ENHANCEMENT ===

  database:
    - focus on migration files, schema changes, and seed data
    - MUST follow database_rules.md strictly
    - MUST create migration with YYYYMMDDHHMMSS_description format
    - MUST include up and down functions in every migration
    - MUST validate schema design (PK, timestamps, soft delete)
    - MUST validate indexing strategy for new tables and queries
    - MUST validate connection pooling configuration
    - MUST NOT create migration without valid down function

  infrastructure:
    - focus on Dockerfile, Kubernetes manifest, and CI/CD configuration
    - MUST follow infra_rules.md strictly
    - MUST use multi-stage build and non-root user in Dockerfile
    - MUST define resource limits and health checks in K8s manifest
    - MUST validate CI/CD pipeline stages per infra_rules.md
    - MUST reference infra_contract.yaml for environment and resource specs

output_schema:
  files_changed:
    - path: string
      description: string

  summary:
    - string

  tests_added:
    - string

  status: success|failed

  # === ENTERPRISE ENHANCEMENT ===

  migration_files:
    - path: string
      description: string
      has_up: boolean
      has_down: boolean

  infra_files:
    - path: string
      description: string
      type: dockerfile|kubernetes|cicd