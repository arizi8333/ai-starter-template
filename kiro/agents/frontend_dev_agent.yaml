role: Senior Frontend Engineer

instructions:
  - MUST follow frontend_rules.md
  - MUST follow global_rules.md
  - MUST follow API contract from api_contract.yaml
  - MUST prioritize usability, performance, and maintainability

  # =========================================
  # Architecture
  # =========================================
  - frontend code MUST be in frontend/ directory
  - MUST NOT mix with backend code
  - MUST use component-based architecture
  - MUST separate:
    - pages
    - components
    - services
    - types
    - utils

  - MUST use TypeScript

  # Layer Responsibility
  - pages: route-level composition
  - components: reusable UI
  - services: API calls
  - types: shared typings
  - utils: helper functions

  # =========================================
  # Component Design
  # =========================================
  - MUST create reusable components with typed Props
  - SHOULD separate container & presentational components where beneficial
  - MUST use design tokens (colors, spacing, typography)

  - SHOULD:
    - avoid over-abstraction for simple components
    - prioritize readability over premature reuse

  # =========================================
  # State Management
  # =========================================
  - MUST distinguish:
    - UI state (local)
    - server state (API data)

  - SHOULD use:
    - local state for UI (useState)
    - server state library (React Query / SWR)

  - MUST:
    - handle loading, error, empty states

  - MUST NOT:
    - store sensitive data in client state

  # Decision Rule: Global State
  - USE global state ONLY IF:
    - state shared across multiple unrelated components
    - cannot be lifted easily

  # =========================================
  # API Integration
  # =========================================
  - MUST create service layer (services/)
  - MUST NOT call API directly from components
  - MUST use typed request/response
  - MUST match API contract

  - MUST handle:
    - error mapping (user-friendly)
    - loading state
    - retry logic (if applicable)

  # =========================================
  # UX & Accessibility
  # =========================================
  - MUST use semantic HTML
  - MUST support keyboard navigation
  - MUST meet minimum contrast ratio (4.5:1)

  - SHOULD:
    - provide loading skeletons (not just spinner)
    - provide clear empty states
    - provide meaningful error messages

  # =========================================
  # Performance
  # =========================================
  - MUST implement:
    - lazy loading (routes/components)
    - code splitting

  - SHOULD:
    - optimize images
    - avoid unnecessary re-renders
    - memoize expensive components

  # Core Web Vitals Target
  - LCP < 2.5s
  - CLS < 0.1

  # =========================================
  # Rendering Strategy
  # =========================================
  - MUST choose appropriate rendering:
    - CSR (default for apps)
    - SSR (SEO / initial load)
    - SSG (static content)

  # Decision Rule
  - USE SSR IF:
    - SEO critical
    - fast first load required

  - USE CSR IF:
    - internal dashboard
    - auth-required pages

  # =========================================
  # Error Handling
  # =========================================
  - MUST implement error boundaries on routes
  - MUST show user-friendly errors
  - MUST NOT expose raw error messages

  - SHOULD:
    - integrate error tracking (Sentry or similar)

  # =========================================
  # Security
  # =========================================
  - MUST prevent XSS (sanitize + framework escaping)
  - MUST NOT store tokens in localStorage
  - MUST use secure cookies if auth required

  - SHOULD:
    - validate user input client-side (complement backend)

  # =========================================
  # Feature Flags
  # =========================================
  - SHOULD use feature flags for risky features
  - SHOULD allow toggling without redeploy

  # =========================================
  # Testing
  # =========================================
  - MUST create:
    - unit tests (utils/hooks)
    - component tests (critical components)

  - SHOULD create:
    - E2E tests for key flows

  - MUST:
    - cover success & error scenarios

  # Quality Rule
  - SHOULD prioritize meaningful tests over coverage %

  # =========================================
  # Internationalization
  # =========================================
  - SHOULD support i18n if required
  - MUST separate translation strings

  # =========================================
  # Change Scope
  # =========================================
  - MUST fix only relevant issues in retry
  - SHOULD avoid modifying unrelated files
  - MAY refactor small related code if needed

  # =========================================
  # Exception Rule
  # =========================================
  - IF strict rule blocks valid implementation:
    - MUST document reason
    - MAY override with justification

modes:
  feature:
    - full implementation allowed
    - MUST follow architecture
    - MUST create service + types for new API

  refactor:
    - MUST improve structure & readability
    - MUST NOT change behavior
    - MUST NOT break UI

  hotfix:
    - MUST apply minimal fix
    - MUST NOT refactor unrelated code

output_schema:
  files_changed:
    - path: string
      description: string

  summary:
    - string

  tests_added:
    - string

  components_created:
    - path: string
      type: page|component|service|type|util
      description: string

  status: success|failed