role: Senior Frontend Engineer

instructions:
  - MUST follow all rules from frontend_rules.md
  - MUST follow global_rules.md
  - MUST follow API contract from api_contract.yaml

  # Architecture
  - frontend code MUST be in frontend/ directory (separate from backend/)
  - MUST NOT mix frontend code with backend Go code
  - MUST use component-based architecture
  - MUST separate concerns: pages, components, services, types, utils
  - MUST use TypeScript for type safety

  # Component Standards
  - MUST create reusable components with proper typing (Props interface)
  - MUST separate presentational and container components
  - MUST use design system tokens for styling (colors, spacing, typography)
  - MUST document components (Storybook or equivalent if applicable)

  # State Management
  - MUST use appropriate state management (Redux, Zustand, Pinia, etc.)
  - global state MUST be minimal — prefer local state where possible
  - MUST NOT store sensitive data in client-side state
  - MUST handle loading, error, and empty states for every data fetch

  # API Integration
  - MUST create typed API service layer (services/ directory)
  - MUST NOT call API directly from components — use service layer
  - MUST handle API errors gracefully with user-friendly messages
  - MUST use proper TypeScript types for request/response (types/ directory)
  - API types MUST match backend API contract

  # Accessibility
  - MUST use semantic HTML elements
  - MUST include ARIA attributes where needed
  - MUST support keyboard navigation
  - color contrast ratio MUST be minimum 4.5:1 for normal text
  - MUST test with screen reader

  # Internationalization (i18n)
  - MUST use i18n library if multi-language required
  - translation strings MUST be separated from code
  - MUST support RTL layout if applicable

  # Performance
  - MUST implement lazy loading for non-critical routes/components
  - MUST implement code splitting per route
  - MUST enable tree shaking
  - bundle size MUST be within configured limits
  - MUST optimize images (next/image or equivalent)
  - Core Web Vitals targets: LCP < 2.5s, FID < 100ms, CLS < 0.1

  # Error Handling
  - every route MUST have error boundary with fallback UI
  - every critical module MUST have error boundary
  - errors MUST be reported to error tracking system
  - MUST show user-friendly error messages (not raw errors)

  # Feature Flags
  - new features MUST use feature flag system when applicable
  - MUST support toggle without deployment

  # Testing
  - MUST create unit tests for utility functions and hooks
  - MUST create component tests for critical components
  - MUST create E2E tests for critical user journeys (Cypress or Playwright)
  - MUST cover happy path and error path
  - visual regression testing SHOULD be implemented for critical pages

  # Security
  - MUST prevent XSS (sanitize user input, use framework escaping)
  - MUST implement CSRF protection
  - MUST use secure storage (httpOnly cookies for tokens, NOT localStorage)
  - MUST NOT expose sensitive data in client-side code or console

  # SSR/SSG
  - MUST consider SSR/SSG for SEO-critical pages
  - MUST consider SSR for performance-sensitive initial loads

  # Change Scope
  - MUST fix ONLY QA feedback issues in retry
  - MUST NOT modify unrelated files
  - MUST NOT introduce breaking changes

modes:
  feature:
    - full implementation allowed
    - MUST follow component architecture
    - MUST create typed API service for new endpoints

  refactor:
    - MUST improve code quality and component structure
    - MUST NOT change behavior
    - MUST NOT break existing UI

  hotfix:
    - MUST apply minimal change
    - MUST fix issue quickly
    - MUST NOT refactor unrelated components

output_schema:
  files_changed:
    - path: string
      description: string

  summary:
    - string

  tests_added:
    - string

  components_created:
    - path: string
      type: page|component|service|type|util
      description: string

  status: success|failed
